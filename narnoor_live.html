<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Narnoor Block — NITI Aayog ABP | Adilabad, Telangana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --s:#E8691A;--sd:#c4540f;--sl:#f0833a;--sp:#fff4ee;
  --t:#0d7377;--td:#085f63;--tl:#14a3a8;--tp:#e6f7f7;
  --g:#d4a017;--gl:#f0c040;--gp:#fffbeb;
  --f:#1a4d3a;--fd:#0f2e22;--fl:#2d7a5e;
  --n:#1a2744;--nl:#243560;
  --bg:#f2f5f0;--w:#fff;--w2:#f8faf8;
  --b:#dde8dd;--b2:#c4d8c4;
  --tx:#0f1e0f;--tx2:#3a5c3a;--tx3:#7a9a7a;
  --red:#dc2626;--pur:#7c3aed;
  --r1:14px;--r2:18px;--r3:24px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;overflow-x:hidden;}
/* LOADER */
#L{position:fixed;inset:0;background:linear-gradient(135deg,var(--fd),var(--n));z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .6s;}
#L.out{opacity:0;pointer-events:none;}
.sp{width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top:3px solid var(--sl);border-radius:50%;animation:rot .9s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--t);color:#fff;padding:10px 18px;border-radius:12px;font-size:12.5px;font-weight:700;z-index:8000;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 6px 20px rgba(13,115,119,.35);}
#toast.on{opacity:1;}
#abg{position:fixed;top:68px;right:14px;background:var(--gp);border:1.5px solid var(--gl);border-radius:10px;padding:5px 13px;font-size:11px;font-weight:700;color:#92400e;z-index:400;display:none;}
/* TOPBAR */
.tb{background:var(--fd);color:rgba(255,255,255,.55);padding:5px 22px;font-size:10.5px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.tb a{color:var(--sl);text-decoration:none;}
/* NAV */
.tri3{height:4px;background:linear-gradient(90deg,#FF9933 33%,#fff 33% 66%,#138808 66%);}
.nav{background:rgba(255,255,255,.96);backdrop-filter:blur(16px);box-shadow:0 1px 0 rgba(0,0,0,.06),0 4px 20px rgba(0,0,0,.06);position:sticky;top:0;z-index:500;}
.nw{display:flex;align-items:stretch;max-width:1440px;margin:0 auto;padding:0 18px;}
.brand{display:flex;align-items:center;gap:11px;padding:8px 16px 8px 0;cursor:pointer;flex-shrink:0;border-right:1px solid var(--b);margin-right:10px;}
.bic{width:42px;height:42px;background:linear-gradient(135deg,var(--s),var(--sd));border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:17px;flex-shrink:0;box-shadow:0 3px 10px rgba(232,105,26,.3);font-family:'Playfair Display',serif;}
.b1{font-size:13.5px;font-weight:800;color:var(--fd);line-height:1.2;}
.b2{font-size:8.5px;color:var(--tx3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.nls{display:flex;align-items:stretch;flex:1;}
.ni{position:relative;display:flex;align-items:stretch;}
.nl{display:flex;align-items:center;gap:4px;padding:0 10px;height:58px;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:11.5px;font-weight:700;color:var(--tx2);white-space:nowrap;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.nl:hover,.nl.on{color:var(--s);border-bottom-color:var(--s);}
.arr{font-size:7px;opacity:.5;transition:transform .2s;}
.ni:hover>.nl .arr{transform:rotate(180deg);}
.dd{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--b);border-top:3px solid var(--s);border-radius:0 0 14px 14px;min-width:215px;box-shadow:0 14px 36px rgba(0,0,0,.12);z-index:9999;}
.ni:hover>.dd{display:block;}
.ddi{display:flex;align-items:center;gap:9px;width:100%;padding:11px 16px;background:none;border:none;border-bottom:1px solid var(--b);cursor:pointer;font-size:12px;font-weight:600;color:var(--tx);text-align:left;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.ddi:last-child{border-bottom:none;border-radius:0 0 14px 14px;}
.ddi:hover{background:var(--sp);color:var(--sd);padding-left:20px;}
.nr{display:flex;align-items:center;gap:6px;padding-left:10px;flex-shrink:0;border-left:1px solid var(--b);margin-left:6px;}
.lb{padding:5px 10px;border-radius:7px;border:1.5px solid var(--b);background:#fff;cursor:pointer;font-size:10.5px;font-weight:700;color:var(--tx);transition:all .15s;}
.lb.on{background:var(--t);color:#fff;border-color:var(--t);}
.badm{padding:6px 13px;border-radius:8px;background:var(--sp);color:var(--sd);border:1.5px solid var(--sl);cursor:pointer;font-size:10.5px;font-weight:700;transition:all .15s;}
.badm:hover{background:var(--s);color:#fff;border-color:var(--s);}
.blo{padding:6px 13px;border-radius:8px;background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5;cursor:pointer;font-size:10.5px;font-weight:700;}
.mb{display:none;background:none;border:none;cursor:pointer;padding:8px;font-size:23px;color:var(--fd);}
/* MOBILE */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:498;backdrop-filter:blur(3px);}
.mov.on{display:block;}
.mdr{position:fixed;right:0;top:0;bottom:0;width:295px;background:#fff;z-index:499;overflow-y:auto;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-6px 0 28px rgba(0,0,0,.15);}
.mov.on .mdr{transform:translateX(0);}
.mhd{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--fd),var(--n));}
.mhd span{color:#fff;font-weight:800;font-size:14px;}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:rgba(255,255,255,.7);}
.ml{display:block;width:100%;padding:12px 20px;background:none;border:none;border-bottom:1px solid #f0f4f0;cursor:pointer;font-size:13px;font-weight:700;color:var(--tx);text-align:left;font-family:'Plus Jakarta Sans',sans-serif;}
.ml:hover,.ml.on{background:var(--sp);color:var(--sd);}
.mg{padding:6px 20px 3px;font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;background:#f8faf8;border-bottom:1px solid var(--b);}
.ms{display:block;width:100%;padding:10px 32px;background:none;border:none;border-bottom:1px solid #f0f4f0;cursor:pointer;font-size:12.5px;color:var(--tx2);text-align:left;font-family:'Plus Jakarta Sans',sans-serif;}
.ms:hover{color:var(--s);background:var(--sp);}
.mft{padding:14px 18px;border-top:1px solid var(--b);display:flex;flex-direction:column;gap:8px;}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.mo{background:#fff;border-radius:20px;padding:30px;width:440px;max-width:100%;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.2);}
.mox{position:absolute;top:14px;right:16px;background:var(--bg);border:none;font-size:18px;cursor:pointer;color:var(--tx2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
/* HERO */
.hero{position:relative;overflow:hidden;min-height:580px;display:flex;align-items:center;justify-content:center;}
.hbg{position:absolute;inset:0;background:linear-gradient(145deg,#071209 0%,#0f2415 25%,#143020 50%,#0c3b22 70%,#061810 100%);}
.hg1{position:absolute;top:-80px;right:-80px;width:550px;height:550px;border-radius:50%;background:radial-gradient(circle,rgba(232,105,26,.1) 0%,transparent 60%);}
.hg2{position:absolute;bottom:-100px;left:-60px;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(13,115,119,.1) 0%,transparent 60%);}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:56px 56px;}
.hin{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:58px 24px 50px;text-align:center;}
.hcrown{display:inline-flex;align-items:center;gap:8px;background:rgba(232,105,26,.12);border:1px solid rgba(232,105,26,.28);border-radius:50px;padding:7px 20px;font-size:10.5px;font-weight:700;color:var(--sl);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5.5vw,52px);font-weight:900;line-height:1.08;margin-bottom:10px;color:#fff;letter-spacing:-.5px;}
.hs{color:var(--sl);}
.htl{color:#5ff0f0;}
.hdesc{font-size:14.5px;color:rgba(255,255,255,.6);margin:0 auto 30px;line-height:1.9;max-width:560px;}
.hstats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;max-width:840px;margin:0 auto 28px;}
.hst{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:13px 7px;text-align:center;backdrop-filter:blur(8px);transition:all .25s;cursor:default;}
.hst:hover{background:rgba(255,255,255,.1);transform:translateY(-3px);border-color:rgba(232,105,26,.35);}
.hst-n{font-size:21px;font-weight:900;color:var(--sl);font-family:'Playfair Display',serif;}
.hst-l{font-size:8px;color:rgba(255,255,255,.5);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.bp{background:linear-gradient(135deg,var(--s),var(--sd));color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 5px 18px rgba(232,105,26,.35);transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;}
.bp:hover{transform:translateY(-2px);box-shadow:0 9px 26px rgba(232,105,26,.45);}
.bt{background:linear-gradient(135deg,var(--t),var(--td));color:#fff;border:none;padding:12px 22px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;}
.bt:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(13,115,119,.3);}
.bg{background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.2);padding:12px 22px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;}
.bg:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);}
/* RIBBON */
.tri{height:5px;background:linear-gradient(90deg,#FF9933 33%,#fff 33% 66%,#138808 66%);}
.rib{background:#fff;border-bottom:1px solid var(--b);overflow:hidden;}
.ribin{display:flex;overflow-x:auto;max-width:1440px;margin:0 auto;}
.ribin::-webkit-scrollbar{height:0;}
.ri{flex-shrink:0;padding:12px 22px;text-align:center;border-right:1px solid var(--b);transition:background .15s;cursor:default;}
.ri:hover{background:var(--sp);}
.ri-n{font-size:15px;font-weight:900;color:var(--s);font-family:'Playfair Display',serif;}
.ri-l{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;font-weight:600;}
/* SECTIONS */
.sec{padding:50px 24px;max-width:1220px;margin:0 auto;}
.salt{background:linear-gradient(180deg,#eaf0ea,#dfe9df);}
.sdark{background:linear-gradient(135deg,var(--fd),var(--n));}
.stag{font-size:10px;font-weight:800;color:var(--s);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.stag::before{content:'';width:20px;height:2px;background:var(--s);border-radius:1px;}
.sh{font-family:'Playfair Display',serif;font-size:clamp(22px,3.5vw,34px);font-weight:800;color:var(--tx);margin-bottom:6px;line-height:1.15;}
.sh span{color:var(--t);}
.ss{font-size:13.5px;color:var(--tx2);max-width:520px;line-height:1.75;}
/* CARDS */
.card{background:#fff;border:1px solid var(--b);border-radius:var(--r2);padding:20px;transition:all .25s;}
.card:hover{box-shadow:0 8px 28px rgba(0,0,0,.09);transform:translateY(-3px);}
.cs{border-top:4px solid var(--s);}
.ct{border-top:4px solid var(--t);}
.cg{border-top:4px solid var(--g);}
.cf{border-top:4px solid var(--f);}
.cls{border-left:4px solid var(--s);}
.clt{border-left:4px solid var(--t);}
/* GRIDS */
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.g2c{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start;}
.g3c{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
/* PILL */
.pill{display:inline-flex;align-items:center;padding:3px 11px;border-radius:50px;font-size:10px;font-weight:700;}
.pg{background:#dcfce7;color:#15803d;}
.pa{background:var(--sp);color:var(--sd);}
.pb{background:var(--tp);color:var(--td);}
.pr{background:#fee2e2;color:var(--red);}
.pv{background:#f3e8ff;color:var(--pur);}
.pgold{background:var(--gp);color:#92400e;}
/* HIGHLIGHT */
.hl{border-left:4px solid var(--t);background:var(--tp);border-radius:0 13px 13px 0;padding:14px 17px;margin-bottom:11px;transition:all .2s;}
.hl:hover{transform:translateX(4px);}
.hls{border-color:var(--s);background:var(--sp);}
.hlg{border-color:var(--g);background:var(--gp);}
.hlf{border-color:var(--f);background:#edf5f0;}
.hl-t{font-size:13.5px;font-weight:700;color:var(--tx);margin-bottom:3px;}
.hl-s{font-size:12px;color:var(--tx2);line-height:1.65;}
/* STAT BOX */
.sb{background:#fff;border:1px solid var(--b);border-radius:14px;padding:15px;display:flex;align-items:center;gap:13px;transition:all .2s;}
.sb:hover{box-shadow:0 5px 18px rgba(0,0,0,.08);}
.sbic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.sbn{font-size:22px;font-weight:900;color:var(--tx);line-height:1;font-family:'Playfair Display',serif;}
.sbl{font-size:10.5px;color:var(--tx2);margin-top:2px;font-weight:600;}
/* PROGRESS */
.pb2{height:7px;background:var(--b);border-radius:4px;overflow:hidden;}
.pbf{height:100%;border-radius:4px;transition:width .8s ease;}
/* TABS / FILTERS */
.tabs{display:flex;border-bottom:2px solid var(--b);margin-bottom:22px;overflow-x:auto;}
.tab{padding:10px 17px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--tx2);white-space:nowrap;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.tab:hover,.tab.on{color:var(--s);border-bottom-color:var(--s);}
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:17px;}
.fb{padding:6px 16px;border-radius:50px;border:1.5px solid var(--b);background:#fff;color:var(--tx2);cursor:pointer;font-size:11.5px;font-weight:700;transition:all .18s;font-family:'Plus Jakarta Sans',sans-serif;}
.fb.on,.fb:hover{background:var(--s);color:#fff;border-color:var(--s);}
/* FORMS */
.fi{width:100%;background:#fff;border:1.5px solid var(--b);border-radius:10px;padding:9px 13px;font-size:12.5px;color:var(--tx);outline:none;margin-bottom:10px;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.fi:focus{border-color:var(--t);box-shadow:0 0 0 3px rgba(13,115,119,.1);}
textarea.fi{resize:vertical;min-height:78px;margin-bottom:0;}
select.fi{cursor:pointer;}
.fl{display:block;font-size:9.5px;font-weight:800;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
/* BUTTONS */
.btn-g{background:linear-gradient(135deg,var(--t),var(--td));color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(13,115,119,.3);}
.btn-s{background:linear-gradient(135deg,var(--s),var(--sd));color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-wa{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-wa:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(22,163,74,.3);}
.btn-del{background:#fee2e2;color:var(--red);border:1px solid #fca5a5;padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;}
.btn-e{background:var(--tp);color:var(--td);border:1px solid rgba(13,115,119,.3);padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;margin-right:5px;}
.btn-sv{background:var(--t);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-ca{background:#f1f5f9;color:var(--tx2);border:1px solid var(--b);padding:8px 18px;border-radius:8px;font-size:12px;cursor:pointer;margin-left:8px;}
/* ADMIN */
.arow{background:var(--w2);border:1px solid var(--b);border-radius:12px;padding:11px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:6px;transition:all .15s;}
.arow:hover{border-color:rgba(13,115,119,.3);background:var(--tp);}
.ai{flex:1;min-width:0;font-size:12.5px;}
.aa{display:flex;gap:5px;flex-shrink:0;}
.ef{background:var(--tp);border:1.5px solid rgba(13,115,119,.28);border-radius:13px;padding:17px;margin-bottom:11px;}
.et{font-size:12.5px;font-weight:800;color:var(--td);margin-bottom:13px;}
.eac{display:flex;gap:8px;margin-top:11px;}
.as{background:var(--sp);border:1.5px solid rgba(232,105,26,.28);border-radius:13px;padding:17px;margin-bottom:17px;}
.at{font-size:12.5px;font-weight:800;color:var(--sd);margin-bottom:13px;}
/* KPI CARD */
.kc{background:#fff;border:1px solid var(--b);border-radius:14px;padding:15px;border-top:4px solid var(--t);transition:all .25s;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;right:0;width:55px;height:55px;background:radial-gradient(circle at top right,var(--tp),transparent);border-radius:0 14px 0 55px;}
.kc:hover{box-shadow:0 7px 25px rgba(0,0,0,.1);transform:translateY(-3px);}
.kc.sat{border-top-color:#16a34a;}.kc.exc{border-top-color:var(--t);}.kc.ong{border-top-color:var(--s);}
.kn{font-size:11.5px;font-weight:700;color:var(--tx2);margin-bottom:6px;line-height:1.45;}
.kv{font-size:21px;font-weight:900;color:var(--tx);font-family:'Playfair Display',serif;}
.knote{font-size:10px;color:var(--t);margin-top:2px;font-weight:700;}
.kbase{font-size:10px;color:var(--tx3);}
/* OFFICER */
.ofc{background:#fff;border:1px solid var(--b);border-radius:var(--r2);padding:22px 18px;text-align:center;transition:all .25s;position:relative;overflow:hidden;}
.ofc::before{content:'';position:absolute;top:0;left:0;right:0;height:76px;background:linear-gradient(135deg,var(--fd),var(--n));border-radius:var(--r2) var(--r2) 0 0;}
.ofc:hover{box-shadow:0 10px 30px rgba(0,0,0,.12);transform:translateY(-4px);}
.ofav{width:80px;height:80px;border-radius:50%;margin:0 auto 13px;position:relative;z-index:1;border:3px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.2);overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--s),var(--sd));flex-shrink:0;}
.ofav img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.ofav-txt{font-size:24px;font-weight:900;color:#fff;font-family:'Playfair Display',serif;line-height:1;}
/* AWARD */

function fixUrl(u){
  if(!u||!u.trim())return"";
  // Google Drive share link → thumbnail
  const m=u.match(/\/file\/d\/([^\/\?]+)/)||u.match(/[?&]id=([^&]+)/);
  if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;

  if(u.includes("drive.google.com/open"))return u.replace("open?","thumbnail?")+"&sz=w400";
  // Already direct image or other URL

}

async function sb(path,method="GET",data=null){
  const h={

    "Authorization":`Bearer ${SK}`,
    "Content-Type":"application/json",
    "Prefer":"return=representation",
    "Accept":"application/json"
  };
  // Try multiple times with exponential backoff
  for(let attempt=0;attempt<3;attempt++){
    try{
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),15000);
      const r=await fetch(`${SU}/rest/v1/${path}`,{
        method,
        headers:h,
        body:data?JSON.stringify(data):null,
        signal:controller.signal,
        mode:"cors",
        credentials:"omit"
      });
      clearTimeout(timeout);
      if(r.status===403){
        console.warn("403 Forbidden - Check Supabase API settings. Using fallback data.");
        return[];
      }
      if(!r.ok){const t=await r.text();console.error(path,t);return[];}
      const t=await r.text();return t?JSON.parse(t):[];
    }catch(e){
      console.warn(`Attempt ${attempt+1} failed:`,e.message);
      if(attempt<2)await new Promise(r=>setTimeout(r,1000*(attempt+1)));
    }
  }
  return[];
}

async function loadAll(){
  try{
    const [sets,kpis,off,vis,art,prod,camps,inits,aw,jobs,trans,hi]=await Promise.all([
      sG("site_settings"),sG("kpis","sort_order"),sG("officers","sort_order"),

    ]);
    D.s={};(sets||[]).forEach(s=>D.s[s.key]=s.value);
    // Use DB data if available, else use hardcoded fallback
    D.kpis=(kpis&&kpis.length>0)?kpis:FALLBACK.kpis;
    D.officers=(off&&off.length>0)?off:FALLBACK.officers;
    D.visits=(vis&&vis.length>0)?vis:FALLBACK.visits;
    D.articles=(art&&art.length>0)?art:FALLBACK.articles;
    D.products=(prod&&prod.length>0)?prod:FALLBACK.products;

    D.initiatives=(inits&&inits.length>0)?inits:FALLBACK.initiatives;
    D.awards=(aw&&aw.length>0)?aw:FALLBACK.awards;
    D.jobs=(jobs&&jobs.length>0)?jobs:FALLBACK.jobs;
    D.transformation=(trans&&trans.length>0)?trans:FALLBACK.transformation;
    D.highlights=(hi&&hi.length>0)?hi:FALLBACK.highlights;
    DB_LIVE=(kpis&&kpis.length>0)||(camps&&camps.length>0);

    // Load all fallback data
    D.kpis=FALLBACK.kpis;D.officers=FALLBACK.officers;D.visits=FALLBACK.visits;

}

<script>
