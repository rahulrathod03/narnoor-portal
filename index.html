.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:rgba(255,255,255,.7);}
.ml{display:block;width:100%;padding:12px 20px;background:none;border:none;border-bottom:1px solid #f0f4f0;cursor:pointer;font-size:13px;font-weight:700;color:var(--tx);text-align:left;font-family:'Plus Jakarta Sans',sans-serif;}
.ml:hover,.ml.on{background:var(--sp);color:var(--sd);}
.mg{padding:6px 20px 3px;font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;background:#f8faf8;border-bottom:1px solid var(--b);}
.ms{display:block;width:100%;padding:10px 32px;background:none;border:none;border-bottom:1px solid #f0f4f0;cursor:pointer;font-size:12.5px;color:var(--tx2);text-align:left;font-family:'Plus Jakarta Sans',sans-serif;}
.ms:hover{color:var(--s);background:var(--sp);}
.mft{padding:14px 18px;border-top:1px solid var(--b);display:flex;flex-direction:column;gap:8px;}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.mo{background:#fff;border-radius:20px;padding:30px;width:440px;max-width:100%;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.2);}
.mox{position:absolute;top:14px;right:16px;background:var(--bg);border:none;font-size:18px;cursor:pointer;color:var(--tx2);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
/* HERO */
.hero{position:relative;overflow:hidden;min-height:580px;display:flex;align-items:center;justify-content:center;}
.hbg{position:absolute;inset:0;background:linear-gradient(145deg,#071209 0%,#0d2b1a 20%,#1b4332 45%,#0a9396 70%,#006d77 90%,#071209 100%);background-size:400% 400%;animation:gradShift 12s ease infinite;}
.hg1{position:absolute;top:-80px;right:-80px;width:550px;height:550px;border-radius:50%;background:radial-gradient(circle,rgba(232,105,26,.1) 0%,transparent 60%);}
.hg2{position:absolute;bottom:-100px;left:-60px;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(13,115,119,.1) 0%,transparent 60%);}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:56px 56px;}
.hin{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:58px 24px 50px;text-align:center;}
.hcrown{display:inline-flex;align-items:center;gap:8px;background:rgba(232,105,26,.12);border:1px solid rgba(232,105,26,.28);border-radius:50px;padding:7px 20px;font-size:10.5px;font-weight:700;color:var(--sl);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5.5vw,52px);font-weight:900;line-height:1.08;margin-bottom:10px;color:#fff;letter-spacing:-.5px;}
.hs{color:var(--sl);}
.htl{color:#5ff0f0;}
.hdesc{font-size:14.5px;color:rgba(255,255,255,.6);margin:0 auto 30px;line-height:1.9;max-width:560px;}
.hstats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;max-width:840px;margin:0 auto 28px;}
.hst{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:13px 7px;text-align:center;backdrop-filter:blur(8px);transition:all .25s;cursor:default;}
.hst:hover{background:rgba(255,255,255,.1);transform:translateY(-3px);border-color:rgba(232,105,26,.35);}
.hst-n{font-size:22px;font-weight:900;color:var(--sl);font-family:'Poppins',sans-serif;letter-spacing:-1px;line-height:1;}
.hst-l{font-size:8px;color:rgba(255,255,255,.5);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.bp{background:linear-gradient(135deg,var(--s),var(--sd));color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 5px 18px rgba(232,105,26,.35);transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;}
.bp:hover{transform:translateY(-2px);box-shadow:0 9px 26px rgba(232,105,26,.45);}
.bt{background:linear-gradient(135deg,var(--t),var(--td));color:#fff;border:none;padding:12px 22px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;}
.bt:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(13,115,119,.3);}
.bg{background:rgba(255,255,255,.07);color:#fff;border:1.5px solid rgba(255,255,255,.2);padding:12px 22px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all .25s;font-family:'Plus Jakarta Sans',sans-serif;}
.bg:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);}
/* RIBBON */
.tri{height:5px;background:linear-gradient(90deg,#FF9933 33%,#fff 33% 66%,#138808 66%);}
.rib{overflow:hidden;position:relative;background:#fff;border-bottom:1px solid var(--b);}
.ribin{display:flex;animation:marquee 32s linear infinite;width:max-content;}
.ribin:hover{animation-play-state:paused;}
.ri{flex-shrink:0;padding:12px 22px;text-align:center;border-right:1px solid var(--b);transition:background .15s;cursor:default;}
.ri:hover{background:var(--sp);}
.ri-n{font-size:16px;font-weight:900;color:var(--s);font-family:'Poppins',sans-serif;letter-spacing:-0.5px;}
.ri-l{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;font-weight:600;}
/* SECTIONS */
.sec{padding:50px 24px;max-width:1220px;margin:0 auto;}
.salt{background:linear-gradient(180deg,#eaf0ea,#dfe9df);}
.sdark{background:linear-gradient(135deg,var(--fd),var(--n));}
.stag{font-size:10px;font-weight:800;color:var(--s);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.stag::before{content:'';width:20px;height:2px;background:var(--s);border-radius:1px;}
.sh{font-family:'Playfair Display',serif;font-size:clamp(22px,3.5vw,34px);font-weight:800;color:var(--tx);margin-bottom:6px;line-height:1.15;}
.sh span{color:var(--t);}
.ss{font-size:13.5px;color:var(--tx2);max-width:520px;line-height:1.75;}
/* CARDS */
.card{background:#fff;border:1px solid var(--b);border-radius:var(--r2);padding:20px;transition:all .25s;}
.card:hover{box-shadow:0 8px 28px rgba(0,0,0,.09);transform:translateY(-3px);}
.cs{border-top:4px solid var(--s);}
.ct{border-top:4px solid var(--t);}
.cg{border-top:4px solid var(--g);}
.cf{border-top:4px solid var(--f);}
.cls{border-left:4px solid var(--s);}
.clt{border-left:4px solid var(--t);}
/* GRIDS */
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.g2c{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start;}
.g3c{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
/* PILL */
.pill{display:inline-flex;align-items:center;padding:3px 11px;border-radius:50px;font-size:10px;font-weight:700;}
.pg{background:#dcfce7;color:#15803d;}
.pa{background:var(--sp);color:var(--sd);}
.pb{background:var(--tp);color:var(--td);}
.pr{background:#fee2e2;color:var(--red);}
.pv{background:#f3e8ff;color:var(--pur);}
.pgold{background:var(--gp);color:#92400e;}
/* HIGHLIGHT */
.hl{border-left:4px solid var(--t);background:var(--tp);border-radius:0 13px 13px 0;padding:14px 17px;margin-bottom:11px;transition:all .2s;}
.hl:hover{transform:translateX(4px);}
.hls{border-color:var(--s);background:var(--sp);}
.hlg{border-color:var(--g);background:var(--gp);}
.hlf{border-color:var(--f);background:#edf5f0;}
.hl-t{font-size:13.5px;font-weight:700;color:var(--tx);margin-bottom:3px;}
.hl-s{font-size:12px;color:var(--tx2);line-height:1.65;}
/* STAT BOX */
.sb{background:#fff;border:1px solid var(--b);border-radius:14px;padding:15px;display:flex;align-items:center;gap:13px;transition:all .2s;}
.sb:hover{box-shadow:0 5px 18px rgba(0,0,0,.08);}
.sbic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.sbn{font-size:24px;font-weight:900;color:var(--tx);line-height:1;font-family:'Poppins',sans-serif;letter-spacing:-1px;}
.sbl{font-size:10.5px;color:var(--tx2);margin-top:2px;font-weight:600;}
/* PROGRESS */
.pb2{height:7px;background:var(--b);border-radius:4px;overflow:hidden;}
.pbf{height:100%;border-radius:4px;transition:width .8s ease;}
/* TABS / FILTERS */
.tabs{display:flex;border-bottom:2px solid var(--b);margin-bottom:22px;overflow-x:auto;}
.tab{padding:10px 17px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--tx2);white-space:nowrap;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.tab:hover,.tab.on{color:var(--s);border-bottom-color:var(--s);}
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:17px;}
.fb{padding:6px 16px;border-radius:50px;border:1.5px solid var(--b);background:#fff;color:var(--tx2);cursor:pointer;font-size:11.5px;font-weight:700;transition:all .18s;font-family:'Plus Jakarta Sans',sans-serif;}
.fb.on,.fb:hover{background:var(--s);color:#fff;border-color:var(--s);}
/* FORMS */
.fi{width:100%;background:#fff;border:1.5px solid var(--b);border-radius:10px;padding:9px 13px;font-size:12.5px;color:var(--tx);outline:none;margin-bottom:10px;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.fi:focus{border-color:var(--t);box-shadow:0 0 0 3px rgba(13,115,119,.1);}
textarea.fi{resize:vertical;min-height:78px;margin-bottom:0;}
select.fi{cursor:pointer;}
.fl{display:block;font-size:9.5px;font-weight:800;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
/* BUTTONS */
.btn-g{background:linear-gradient(135deg,var(--t),var(--td));color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(13,115,119,.3);}
.btn-s{background:linear-gradient(135deg,var(--s),var(--sd));color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-wa{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn-wa:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(22,163,74,.3);}
.btn-del{background:#fee2e2;color:var(--red);border:1px solid #fca5a5;padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;}
.btn-e{background:var(--tp);color:var(--td);border:1px solid rgba(13,115,119,.3);padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;margin-right:5px;}
.btn-sv{background:var(--t);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-ca{background:#f1f5f9;color:var(--tx2);border:1px solid var(--b);padding:8px 18px;border-radius:8px;font-size:12px;cursor:pointer;margin-left:8px;}
/* ADMIN */
.arow{background:var(--w2);border:1px solid var(--b);border-radius:12px;padding:11px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-wrap:wrap;gap:6px;transition:all .15s;}
.arow:hover{border-color:rgba(13,115,119,.3);background:var(--tp);}
.ai{flex:1;min-width:0;font-size:12.5px;}
.aa{display:flex;gap:5px;flex-shrink:0;}
.ef{background:var(--tp);border:1.5px solid rgba(13,115,119,.28);border-radius:13px;padding:17px;margin-bottom:11px;}
.et{font-size:12.5px;font-weight:800;color:var(--td);margin-bottom:13px;}
.eac{display:flex;gap:8px;margin-top:11px;}
.as{background:var(--sp);border:1.5px solid rgba(232,105,26,.28);border-radius:13px;padding:17px;margin-bottom:17px;}
.at{font-size:12.5px;font-weight:800;color:var(--sd);margin-bottom:13px;}
/* KPI CARD */
.kc{background:#fff;border:1px solid var(--b);border-radius:14px;padding:15px;border-top:4px solid var(--t);transition:all .25s;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;right:0;width:55px;height:55px;background:radial-gradient(circle at top right,var(--tp),transparent);border-radius:0 14px 0 55px;}
.kc:hover{box-shadow:0 7px 25px rgba(0,0,0,.1);transform:translateY(-3px);}
.kc.sat{border-top-color:#16a34a;}.kc.exc{border-top-color:var(--t);}.kc.ong{border-top-color:var(--s);}
.kn{font-size:11.5px;font-weight:700;color:var(--tx2);margin-bottom:6px;line-height:1.45;}
.kv{font-size:21px;font-weight:900;color:var(--tx);font-family:'Poppins',sans-serif;letter-spacing:-1px;}
.knote{font-size:10px;color:var(--t);margin-top:2px;font-weight:700;}
.kbase{font-size:10px;color:var(--tx3);}
/* OFFICER */
.ofc{background:#fff;border:1px solid var(--b);border-radius:var(--r2);padding:22px 18px;text-align:center;transition:all .25s;position:relative;overflow:hidden;}
.ofc::before{content:'';position:absolute;top:0;left:0;right:0;height:76px;background:linear-gradient(135deg,var(--fd),var(--n));border-radius:var(--r2) var(--r2) 0 0;}
.ofc:hover{box-shadow:0 10px 30px rgba(0,0,0,.12);transform:translateY(-4px);}
.ofav{width:80px;height:80px;border-radius:50%;margin:0 auto 13px;position:relative;z-index:1;border:3px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.2);overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--s),var(--sd));flex-shrink:0;}
.ofav img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.ofav-txt{font-size:24px;font-weight:900;color:#fff;font-family:'Playfair Display',serif;line-height:1;}
/* AWARD */
.awc{background:#fff;border:1px solid var(--b);border-radius:var(--r2);padding:19px;text-align:center;transition:all .25s;}
.awc:hover{box-shadow:0 9px 28px rgba(0,0,0,.09);transform:translateY(-4px);}
/* CAMPAIGN */
.cc{background:#fff;border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;transition:all .25s;}
.cc:hover{box-shadow:0 9px 28px rgba(0,0,0,.1);}
.cchd{padding:19px;color:#fff;position:relative;overflow:hidden;}
.cchd::before{content:'';position:absolute;top:-25px;right:-25px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.09);}
.cchd h3{font-size:14.5px;font-weight:800;margin-bottom:3px;font-family:'Playfair Display',serif;position:relative;}
.ctel{font-size:12px;opacity:.8;position:relative;}
.cper{font-size:9px;opacity:.5;text-transform:uppercase;letter-spacing:.7px;margin-top:5px;font-weight:700;position:relative;}
/* INITIATIVE */
.ic{background:#fff;border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;transition:all .25s;}
.ic:hover{box-shadow:0 9px 28px rgba(0,0,0,.1);transform:translateY(-3px);}
.ith{height:128px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;position:relative;overflow:hidden;}
.ith::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);}
.iemj{font-size:36px;position:relative;z-index:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));}
/* PRODUCT */
.pc{background:#fff;border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;transition:all .25s;}
.pc:hover{box-shadow:0 9px 28px rgba(0,0,0,.1);transform:translateY(-3px);}
.pimg{height:155px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;position:relative;}
/* TRANSFORM */
.tr{display:grid;grid-template-columns:1fr 38px 1fr;margin-bottom:11px;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.trb{background:linear-gradient(135deg,#fff5f5,#fee2e2);border:1px solid #fca5a5;padding:13px 15px;}
.trar{background:#f0f4f0;display:flex;align-items:center;justify-content:center;color:var(--t);font-weight:900;font-size:17px;border-top:1px solid var(--b);border-bottom:1px solid var(--b);}
.tra{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;padding:13px 15px;}
.trlb{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;}
.trtx{font-size:12.5px;color:var(--tx);line-height:1.55;}
/* JOB */
.jc{background:#fff;border:1px solid var(--b);border-radius:var(--r2);padding:19px;border-left:5px solid var(--s);}
/* SUCCESS */
.suc{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:var(--r2);padding:26px;text-align:center;}
/* MEDIA UPLOAD CARD */
.upc{background:linear-gradient(135deg,var(--w2),var(--tp));border:2px dashed rgba(13,115,119,.3);border-radius:var(--r3);padding:30px 24px;text-align:center;transition:all .2s;}
.upc:hover{border-color:var(--t);background:var(--tp);}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 15px;text-align:left;font-size:10px;font-weight:800;color:var(--tx2);text-transform:uppercase;background:var(--w2);border-bottom:2px solid var(--b);letter-spacing:.5px;}
.tbl td{padding:10px 15px;font-size:12.5px;border-bottom:1px solid var(--b);}
.tbl tr:hover td{background:var(--tp);}
/* TICKET */
.ticket{background:#fff;border-radius:var(--r2);overflow:hidden;border:1px solid var(--b);box-shadow:0 5px 20px rgba(0,0,0,.07);}
.tickhd{background:linear-gradient(135deg,var(--fd),var(--n));color:#fff;padding:18px;display:flex;align-items:center;gap:13px;}
/* FOOTER */
.footer{background:linear-gradient(145deg,var(--fd),var(--n));color:#fff;padding:34px 24px;position:relative;overflow:hidden;}
.footer::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(232,105,26,.07),transparent);}
.fin{max-width:940px;margin:0 auto;text-align:center;position:relative;}
/* RESPONSIVE */
@media(max-width:1100px){.hstats{grid-template-columns:repeat(3,1fr);}}
@media(max-width:960px){.nls,.nr{display:none;}.mb{display:flex;}.hstats{grid-template-columns:repeat(3,1fr);}.g2c{grid-template-columns:1fr;}.g3c{grid-template-columns:1fr 1fr;}
  #chat-box{width:calc(100vw - 32px);right:16px;bottom:130px;}
  .hbtns{gap:8px;}.hbtns button{padding:10px 16px;font-size:12px;}}
@media(max-width:768px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}.g4{grid-template-columns:repeat(2,1fr);}
  .tr{grid-template-columns:1fr 28px 1fr;}
  #chat-box{height:400px;}
  .sec{padding:36px 18px;}}
@media(max-width:600px){.hin{padding:42px 16px 36px;}.dash-sum-grid{grid-template-columns:1fr 1fr!important;}.dash-sum-grid>div:first-child{grid-column:1/-1!important;}.hstats{grid-template-columns:repeat(2,1fr);}.sec{padding:28px 14px;}.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr;}.g4{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}.g3c{grid-template-columns:1fr;}.tr{grid-template-columns:1fr 24px 1fr;}.tb>span:last-child{display:none;}
  #chat-fab{bottom:70px;right:14px;}
  #chat-box{width:calc(100vw - 28px);right:14px;bottom:136px;height:380px;}
  .hbtns button{padding:9px 14px;font-size:11.5px;}
  .hst-n{font-size:18px;}}
@media(max-width:400px){.hstats{grid-template-columns:repeat(2,1fr);}.g4{grid-template-columns:1fr 1fr;}}

/* Museum virtual tour — horizontal landscape strip */
.museum-gallery{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  gap:3px;
  height:260px;
  background:#0a0f0a;
}
.museum-gallery::-webkit-scrollbar{display:none;}
.museum-card{
  flex:0 0 min(420px,80vw);
  width:min(420px,80vw);
  height:260px;
  scroll-snap-align:start;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
.museum-card img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 30%;
  display:block;
  transition:transform .6s ease, filter .4s ease;
  filter:brightness(.8);
}
.museum-card:hover img{transform:scale(1.07);filter:brightness(1);}
.museum-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(5,30,20,.94) 0%,rgba(5,30,20,.1) 45%,transparent 65%);
  pointer-events:none;
}
.museum-info{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:11px 15px;
}
.museum-tag{
  font-size:8px;font-weight:800;
  color:#94d2bd;
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:3px;
}
.museum-title{
  font-family:'Playfair Display',serif;
  font-size:13.5px;font-weight:800;
  color:#fff;line-height:1.2;
}
.museum-num{
  position:absolute;top:9px;right:11px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  color:#fff;font-size:9px;font-weight:700;
  padding:3px 9px;border-radius:50px;
}
/* Lightbox */
#photo-lb{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.96);
  z-index:8000;
  flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;
}
.lb-close{
  position:absolute;top:14px;right:16px;
  background:rgba(255,255,255,.1);border:none;
  color:#fff;width:38px;height:38px;
  border-radius:50%;font-size:18px;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  font-family:sans-serif;
}
.lb-nav{
  position:absolute;top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,.1);border:none;
  color:#fff;width:46px;height:46px;
  border-radius:50%;font-size:22px;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  font-family:sans-serif;
}
#lb-img{
  max-width:90vw;max-height:68vh;
  border-radius:12px;object-fit:contain;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.lb-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.25);
  cursor:pointer;transition:all .3s;border:none;
}
.lb-dot.on{background:#fff;width:16px;border-radius:3px;}
/* Mobile */
@media(max-width:640px){
  .media-grid{grid-template-columns:1fr!important;}
  /* Block profile GP table — mobile */
  .gp-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;font-size:11px;}
  .gp-table tr:not(thead tr):hover{background:#e8f5e9!important;transition:background .2s;}
  .gp-table td:first-child{font-weight:700;color:var(--td);}
  .gp-table th,.gp-table td{padding:6px 8px!important;font-size:11px!important;}
  .dash-sum-grid{grid-template-columns:1fr 1fr!important;}
  .dash-sum-grid>div:first-child{grid-column:1/-1!important;}
  .two-col-admin{grid-template-columns:1fr!important;}
}
  .museum-gallery{height:200px;}
  .museum-card{flex:0 0 min(300px,86vw);width:min(300px,86vw);height:200px;}
  .museum-title{font-size:12px;}
  .museum-num{font-size:8px;}
  .lb-nav{width:38px;height:38px;font-size:18px;}
  #lb-img{max-width:96vw;max-height:60vh;}
}</style>
</head>

function fixUrl(u){
  if(!u||!u.trim())return"";
  // Google Drive share link → thumbnail
  const m=u.match(/\/file\/d\/([^\/\?]+)/)||u.match(/[?&]id=([^&]+)/);
  if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  // drive.google.com/open?id=
  if(u.includes("drive.google.com/open"))return u.replace("open?","thumbnail?")+"&sz=w400";
  // Already direct image or other URL
  return u;
}

/* ── SUPABASE API ── */
async function sb(path,method="GET",data=null){
  const h={
    "apikey":SK,
    "Authorization":`Bearer ${SK}`,
    "Content-Type":"application/json",
    "Prefer":"return=representation",
    "Accept":"application/json"
  };
  // Try multiple times with exponential backoff
  for(let attempt=0;attempt<2;attempt++){
    try{
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),4000);
      const r=await fetch(`${SU}/rest/v1/${path}`,{
        method,
        headers:h,
        body:data?JSON.stringify(data):null,
        signal:controller.signal,
        mode:"cors",
        credentials:"omit"
      });
      clearTimeout(timeout);
      if(r.status===403){
        console.warn("403 Forbidden - Check Supabase RLS settings.");
        return null; // null = use fallback, [] = empty from DB
      }
      if(!r.ok){const t=await r.text();console.error(path,t);return[];}
      const t=await r.text();return t?JSON.parse(t):[];
    }catch(e){
      console.warn(`Attempt ${attempt+1} failed:`,e.message);
      if(attempt<2)await new Promise(r=>setTimeout(r,500));
    }
  }
  return[];
}

const sP=(t,d)=>sb(t,"POST",d);
const sPa=(t,id,d)=>sb(`${t}?id=eq.${id}`,"PATCH",d);
const sD=(t,id)=>sb(`${t}?id=eq.${id}`,"DELETE");
async function sSet(k,v){
  const ex=await sb(`site_settings?key=eq.${encodeURIComponent(k)}&select=key`);
  if(ex.length)await sb(`site_settings?key=eq.${encodeURIComponent(k)}`,"PATCH",{value:v});
  else await sb("site_settings","POST",{key:k,value:v});
  D.s[k]=v;
}

let DB_LIVE=false; // tracks if we got real DB data

async function loadAll(){
  try{
    const [sets,kpis,off,vis,art,prod,camps,inits,aw,jobs,trans,hi]=await Promise.all([
      sG("site_settings"),sG("kpis","sort_order"),sG("officers","sort_order"),
      sG("official_visits","id.desc"),sG("articles","id.desc"),sG("products","id"),
      sG("campaigns","sort_order"),sG("initiatives","sort_order"),sG("awards","sort_order"),
      sG("jobs","id.desc"),sG("transformation","sort_order"),sG("highlights","sort_order")
    ]);
    D.s={};(sets||[]).forEach(s=>D.s[s.key]=s.value);
    // Use DB data if available, else use hardcoded fallback
    // Use DB data if array (even empty), fallback only if null (network error)
    D.kpis=(Array.isArray(kpis)&&kpis.length>0)?kpis:FALLBACK.kpis;
    D.officers=(Array.isArray(off)&&off.length>0)?off:FALLBACK.officers;
    // Deduplicate to prevent double entries
    const dedup=arr=>{const s=new Set();return arr.filter(x=>{const k=x.id||x.name||x.title;if(s.has(k))return false;s.add(k);return true;});};
    D.visits=(vis&&vis.length>0)?vis:FALLBACK.visits;
    D.articles=(art&&art.length>0)?art:FALLBACK.articles;
    D.products=(prod&&prod.length>0)?prod:FALLBACK.products;
    D.campaigns=(Array.isArray(camps)&&camps.length>0)?camps:FALLBACK.campaigns;
    D.initiatives=(Array.isArray(inits)&&inits.length>0)?dedup(inits):FALLBACK.initiatives;
    D.awards=(aw&&aw.length>0)?aw:FALLBACK.awards;
    D.jobs=(Array.isArray(jobs)&&jobs.length>0)?jobs:FALLBACK.jobs;
    D.transformation=(trans&&trans.length>0)?trans:FALLBACK.transformation;
    D.highlights=(hi&&hi.length>0)?dedup(hi):FALLBACK.highlights;
    DB_LIVE=(kpis&&kpis.length>0)||(camps&&camps.length>0);
  }catch(e){
    console.error("Load error, using fallback data:",e);
    // Load all fallback data
    D.kpis=FALLBACK.kpis;D.officers=FALLBACK.officers;D.visits=FALLBACK.visits;
    D.articles=FALLBACK.articles;D.products=FALLBACK.products;
    D.campaigns=FALLBACK.campaigns;D.initiatives=FALLBACK.initiatives;
    D.awards=FALLBACK.awards;D.jobs=FALLBACK.jobs;
    D.transformation=FALLBACK.transformation;D.highlights=FALLBACK.highlights;
    DB_LIVE=false;
  }
}

function getReply(msg){
  if(!msg||!msg.trim()) return "Ask me anything about Narnoor! 😊";
  const m = msg.toLowerCase().trim();
  const isTe = /[ఀ-౿]/.test(msg);
  const isHi = /[ऀ-ॿ]/.test(msg);
  // Detect Telugu words written in English (Hinglish/Tenglish)
  const teWords = ["lo em","narnoor lo","ki famous","ela raavali","ela vachali","entha duram",
    "evaru avaru","avaru evaru","em cheyali","emi cheyali","cheppandi","ela undi",
    "em undhi","emundi","guri cheppandi","nundi ela","lo emundi","deniki","naaku","meeru"];
  const hasTeWords = !isTe && teWords.some(w => m.includes(w));
  const lang2 = (isTe || hasTeWords) ? "te" : isHi ? "hi" : "en";
  
  // Score each KB item
  let best = null, bestScore = 0;
  for(const item of KB){
    let score = 0;
    for(const kw of item.q){
      const kwl = kw.toLowerCase();
      if(m.includes(kwl)) score += kwl.length * 2;
      // Exact word match scores higher
      if(m.split(/\s+/).some(w => w === kwl)) score += kwl.length * 3;
    }
    if(score > bestScore){ bestScore = score; best = item; }
  }
  
  if(best && bestScore > 0){
    const reply = best.a[lang2] || best.a.te || best.a.en;
    return reply.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                .replace(/\n/g, "<br>");
  }
  return getDefaultReply(m, isTe || hasTeWords, isHi)
    .replace(/\n/g, "<br>");
}

let lbIdx=0;
function openPhoto(i){
  lbIdx=i;
  const lb=document.getElementById('photo-lb');
  lb.style.display='flex';
  updateLB();
  document.body.style.overflow='hidden';
}
function closeLB(){
  document.getElementById('photo-lb').style.display='none';
  document.body.style.overflow='';
}
function lbNav(dir){
  lbIdx=((lbIdx+dir)+MUSEUM_PHOTOS_DATA.length)%MUSEUM_PHOTOS_DATA.length;
  updateLB();
}
function updateLB(){
  const p=MUSEUM_PHOTOS_DATA[lbIdx];
  const img=document.getElementById('lb-img');
  img.style.opacity='0';
  setTimeout(()=>{img.src=p.src;img.onload=()=>{img.style.transition='opacity .3s';img.style.opacity='1';}},80);
  const t=document.getElementById('lb-title');if(t)t.textContent=p.title;
  document.querySelectorAll('.lb-dot').forEach((d,i)=>d.classList.toggle('on',i===lbIdx));
}
function museumGo(i){
  const g=document.getElementById('museum-gallery');
  if(!g)return;
  const cards=g.querySelectorAll('.museum-card');
  if(cards[i])g.scrollTo({left:cards[i].offsetLeft,behavior:'smooth'});
  document.querySelectorAll('[id^="mdot-"]').forEach((d,j)=>{
    d.style.width=j===i?'18px':'6px';
    d.style.borderRadius=j===i?'3px':'50%';
    d.style.background=j===i?'rgba(255,255,255,.9)':'rgba(255,255,255,.25)';
  });
}
let museumAutoT=null;
function startMuseumAuto(){
  clearInterval(museumAutoT);
  let mc=0;
  museumAutoT=setInterval(()=>{
    if(pg!=='tourism'){clearInterval(museumAutoT);return;}
    mc=(mc+1)%7;
    museumGo(mc);
  },3000);
}
document.addEventListener('keydown',e=>{
  const lb=document.getElementById('photo-lb');
  if(lb&&lb.style.display==='flex'){
    if(e.key==='ArrowRight')lbNav(1);
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='Escape')closeLB();
  }
});

<script>
/* ══ CRUD ACTIONS ══ */
function tE(t,id){const e=document.getElementById(`${t}-e${id}`);if(e)e.style.display=e.style.display==="none"?"block":"none";}
const v=id=>document.getElementById(id)?.value.trim()||"";
const vi=id=>parseInt(document.getElementById(id)?.value)||0;

async function aKPI(){const n=v("ak-n"),val=v("ak-v"),s=v("ak-s"),p=vi("ak-p");if(!n||!val){alert("Enter name and value.");return;}const r=await sP("kpis",{name:n,current_value:val,sector:s,baseline:"—",progress:p,status:p>=95?"sat":p>=80?"exc":"ong",note:"",sort_order:D.kpis.length});if(r[0]){D.kpis.push(r[0]);toast("✓ KPI added");R();}else toast("❌ Error — run SQL setup first");}
async function sKPI(id){const n=v(`kn${id}`),val=v(`kv${id}`),b=v(`kb${id}`),p=vi(`kp${id}`),st=v(`kst${id}`),s=v(`ks${id}`),no=v(`kno${id}`);await sPa("kpis",id,{name:n,current_value:val,baseline:b,progress:p,status:st,sector:s,note:no});D.kpis=D.kpis.map(k=>k.id===id?{...k,name:n,current_value:val,baseline:b,progress:p,status:st,sector:s,note:no}:k);toast("✓ KPI updated");R();}
async function dKPI(id){if(!confirm("Delete this KPI?"))return;await sD("kpis",id);D.kpis=D.kpis.filter(k=>k.id!==id);toast("🗑 Deleted");R();}

async function aCamp(){const n=v("ac-n"),tn=v("ac-tn"),p=v("ac-p"),t=v("ac-t"),col=v("ac-c"),d=v("ac-d"),ph=v("ac-ph");if(!n){alert("Enter campaign name.");return;}const r=await sP("campaigns",{name:n,telugu_name:tn,period:p,type:t,color:col||"#0d7377",description:d,photo_url:ph,sort_order:D.campaigns.length});if(r[0]){D.campaigns.push(r[0]);toast("✓ Campaign added");R();}else toast("❌ Error — run SQL setup first");}
async function sCamp(id){const n=v(`cen${id}`),tn=v(`cetn${id}`),p=v(`cep${id}`),t=v(`cet${id}`),col=v(`cec${id}`),d=v(`ced${id}`),ph=v(`ceph${id}`);await sPa("campaigns",id,{name:n,telugu_name:tn,period:p,type:t,color:col,description:d,photo_url:ph});D.campaigns=D.campaigns.map(c=>c.id===id?{...c,name:n,telugu_name:tn,period:p,type:t,color:col,description:d,photo_url:ph}:c);toast("✓ Updated");R();}
async function dCamp(id){if(!confirm("Delete?"))return;await sD("campaigns",id);D.campaigns=D.campaigns.filter(c=>c.id!==id);toast("🗑 Deleted");R();}

async function aInit(){const t=v("ai-t"),cat=v("ai-c"),tag=v("ai-tag"),e=v("ai-e"),bg=v("ai-bg"),d=v("ai-d"),ph=v("ai-ph"),pdf=v("ai-pdf"),lnk=v("ai-lnk");if(!t){alert("Enter title.");return;}const r=await sP("initiatives",{title:t,category:cat,tag:tag||"Active",emoji:e||"✨",bg_color:bg||"#0d4a30",description:d,photo_url:ph,pdf_url:pdf,link_url:lnk,sort_order:D.initiatives.length});if(r[0]){D.initiatives.push(r[0]);toast("✓ Initiative added");R();}else toast("❌ Error");}
async function sInit(id){const t=v(`it${id}`),cat=v(`ic${id}`),tag=v(`itag${id}`),e=v(`ie${id}`),bg=v(`ibg${id}`),d=v(`id${id}`),ph=v(`iph${id}`);await sPa("initiatives",id,{title:t,category:cat,tag,emoji:e,bg_color:bg,description:d,photo_url:ph});D.initiatives=D.initiatives.map(x=>x.id===id?{...x,title:t,category:cat,tag,emoji:e,bg_color:bg,description:d,photo_url:ph}:x);toast("✓ Updated");R();}
async function dInit(id){if(!confirm("Delete?"))return;await sD("initiatives",id);D.initiatives=D.initiatives.filter(x=>x.id!==id);toast("🗑 Deleted");R();}

async function aTr(){const b=v("at-b"),a=v("at-a");if(!b||!a){alert("Enter before and after.");return;}const r=await sP("transformation",{before_text:b,after_text:a,sort_order:D.transformation.length});if(r[0]){D.transformation.push(r[0]);toast("✓ Row added");R();}}
async function sTr(id){const b=v(`tb${id}`),a=v(`ta${id}`);await sPa("transformation",id,{before_text:b,after_text:a});D.transformation=D.transformation.map(t=>t.id===id?{...t,before_text:b,after_text:a}:t);toast("✓ Updated");R();}
async function dTr(id){if(!confirm("Delete?"))return;await sD("transformation",id);D.transformation=D.transformation.filter(t=>t.id!==id);toast("🗑 Deleted");R();}

async function aHL(){const t=v("ah-t"),s=v("ah-s"),col=v("ah-c");if(!t){alert("Enter title.");return;}const r=await sP("highlights",{title:t,subtitle:s,color:col,sort_order:D.highlights.length});if(r[0]){D.highlights.push(r[0]);toast("✓ Highlight added");R();}}
async function sHL(id){const t=v(`ht${id}`),s=v(`hs2${id}`),col=v(`hc${id}`);await sPa("highlights",id,{title:t,subtitle:s,color:col});D.highlights=D.highlights.map(h=>h.id===id?{...h,title:t,subtitle:s,color:col}:h);toast("✓ Updated");R();}
async function dHL(id){if(!confirm("Delete?"))return;await sD("highlights",id);D.highlights=D.highlights.filter(h=>h.id!==id);toast("🗑 Deleted");R();}

async function aAw(){const ic=v("aw-ic")||"🏆",t=v("aw-t"),s=v("aw-s"),y=v("aw-y"),g2=v("aw-g"),ph=v("aw-ph")||"";if(!t){alert("Enter title.");return;}const r=await sP("awards",{icon:ic,title:t,subtitle:s,year:y,grant_info:g2,photo_url:ph,sort_order:D.awards.length});if(r[0]){D.awards.unshift(r[0]);toast("✓ Award added");R();}}
async function sAw(id){const ic=v(`awic${id}`),t=v(`awt${id}`),s=v(`aws${id}`),y=v(`awy${id}`),g2=v(`awg${id}`),ph=v(`awph${id}`)||"";await sPa("awards",id,{icon:ic,title:t,subtitle:s,year:y,grant_info:g2,photo_url:ph});D.awards=D.awards.sort((a,b)=>(b.year||0)-(a.year||0)).map(a=>a.id===id?{...a,icon:ic,title:t,subtitle:s,year:y,grant_info:g2,photo_url:ph}:a);toast("✓ Updated");R();}
async function dAw(id){if(!confirm("Delete?"))return;await sD("awards",id);D.awards=D.awards.filter(a=>a.id!==id);toast("🗑 Deleted");R();}

async function aOff(){const n=v("ao-n"),r=v("ao-r"),d=v("ao-d"),ph=v("ao-ph");if(!n){alert("Enter name.");return;}const res=await sP("officers",{name:n,role:r,department:d,photo_url:ph,sort_order:D.officers.length});if(res[0]){D.officers.push(res[0]);toast("✓ Officer added");R();}}

// Chat send
function addMsg(text,isUser){
  const msgs=document.getElementById("chat-msgs");
  if(!msgs)return;
  const d=document.createElement("div");
  d.style.cssText=isUser
    ?"background:linear-gradient(135deg,#1b4332,#0a9396);color:#fff;border-radius:13px 13px 3px 13px;padding:10px 13px;font-size:12.5px;line-height:1.6;max-width:88%;align-self:flex-end;margin-left:auto"
    :"background:linear-gradient(135deg,#e0f4f4,#d8f3dc);color:#1b4332;border-radius:13px 13px 13px 3px;padding:10px 13px;font-size:12.5px;line-height:1.6;max-width:90%";
  d.innerHTML=text;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function sendChat(){
  const inp=document.getElementById("chat-in");
  if(!inp||!inp.value.trim())return;
  const msg=inp.value.trim();
  inp.value="";
  addMsg(msg,true);
  // Show typing indicator
  const msgs=document.getElementById("chat-msgs");
  const typing=document.createElement("div");
  typing.id="chat-typing";
  typing.style.cssText="color:#1b4332;font-size:12px;padding:6px;opacity:.6";
  typing.textContent="● typing...";
  if(msgs)msgs.appendChild(typing);
  setTimeout(()=>{
    if(typing)typing.remove();
    const reply=typeof getReply==="function"?getReply(msg):"Ask me anything about Narnoor! 😊";
    addMsg(reply,false);
  },500);
}

let originals=new WeakMap();
function applyTranslation(){
  if(lang==="EN"){restoreOriginal();return;}
  const map=lang==="TE"?TE_MAP:HI_MAP;
  const root=document.getElementById("app");
  if(!root)return;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode:n=>{
      const p=n.parentElement;
      if(!p)return NodeFilter.FILTER_REJECT;
      if(["SCRIPT","STYLE"].includes(p.tagName))return NodeFilter.FILTER_REJECT;
      if(n.textContent.trim().length<2)return NodeFilter.FILTER_SKIP;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes=[];let nd;
  while(nd=walker.nextNode())nodes.push(nd);
  const keys=Object.keys(map).sort((a,b)=>b.length-a.length);
  nodes.forEach(node=>{
    if(!originals.has(node))originals.set(node,node.textContent);
    let text=originals.get(node);
    for(const key of keys){
      if(text.includes(key))text=text.split(key).join(map[key]);
    }
    if(node.textContent!==text)node.textContent=text;
  });
  root.querySelectorAll("input[placeholder],textarea[placeholder]").forEach(el=>{
    if(!el.dataset.origPh)el.dataset.origPh=el.placeholder;
    let ph=el.dataset.origPh;
    for(const key of keys){if(ph.includes(key))ph=ph.split(key).join(map[key]);}
    el.placeholder=ph;
  });
}
function restoreOriginal(){
  const root=document.getElementById("app");if(!root)return;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
  let nd;while(nd=walker.nextNode()){if(originals.has(nd))nd.textContent=originals.get(nd);}
  root.querySelectorAll("input[placeholder],textarea[placeholder]").forEach(el=>{
    if(el.dataset.origPh)el.placeholder=el.dataset.origPh;
  });
  originals=new WeakMap();
}

/* ══ LIVE WEATHER — Open-Meteo (free, no API key) ══ */
const W_LAT=19.1,W_LON=78.5;
const WMO_ICONS={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",71:"❄️",73:"❄️",75:"❄️",80:"🌦️",81:"🌧️",82:"⛈️",85:"❄️",86:"❄️",95:"⛈️",96:"⛈️",99:"⛈️"};
const WMO_DESC={0:"Clear Sky",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Icy Fog",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",61:"Light Rain",63:"Moderate Rain",65:"Heavy Rain",71:"Light Snow",73:"Moderate Snow",75:"Heavy Snow",80:"Light Showers",81:"Rain Showers",82:"Heavy Showers",95:"Thunderstorm",96:"Thunderstorm",99:"Heavy Thunderstorm"};
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

async function loadWeather(){
  showWeatherFallback(); // Show estimates immediately
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),8000);
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${W_LAT}&longitude=${W_LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Kolkata&forecast_days=7`,{signal:controller.signal});
    clearTimeout(timeout);
    if(!r.ok)return;
    const d=await r.json();
    const c=d.current;
    // Current weather
    const code=c.weather_code||0;
    const el=id=>document.getElementById(id);
    if(el("w-icon"))el("w-icon").textContent=WMO_ICONS[code]||"🌤️";
    if(el("w-temp"))el("w-temp").textContent=`${Math.round(c.temperature_2m)}°`;
    if(el("w-feels"))el("w-feels").textContent=`Feels like ${Math.round(c.apparent_temperature)}°C`;
    if(el("w-desc"))el("w-desc").textContent=WMO_DESC[code]||"Clear";
    if(el("w-hum"))el("w-hum").textContent=`${c.relative_humidity_2m}%`;
    if(el("w-wind"))el("w-wind").textContent=`${Math.round(c.wind_speed_10m)} km/h`;
    if(el("w-rain"))el("w-rain").textContent=`${c.precipitation||0} mm`;
    if(el("w-uv"))el("w-uv").textContent=`${Math.round(c.uv_index||0)} UV`;
    // 7-day forecast
    const f=d.daily;
    for(let i=0;i<7;i++){
      const day=new Date(f.time[i]);
      const dc=f.weather_code[i]||0;
      const label=i===0?"Today":i===1?"Tmrw":DAYS[day.getDay()];
      if(el(`fc-day-${i}`))el(`fc-day-${i}`).textContent=label;
      if(el(`fc-icon-${i}`))el(`fc-icon-${i}`).textContent=WMO_ICONS[dc]||"🌤️";
      if(el(`fc-max-${i}`))el(`fc-max-${i}`).textContent=`${Math.round(f.temperature_2m_max[i])}°`;
      if(el(`fc-min-${i}`))el(`fc-min-${i}`).textContent=`${Math.round(f.temperature_2m_min[i])}°`;
      if(el(`fc-rain-${i}`))el(`fc-rain-${i}`).textContent=`${f.precipitation_probability_max[i]||0}%🌧`;
    }
  }catch(e){
    // Show seasonal estimate for Narnoor when API unreachable
    console.warn("Weather API:",e.message);
    showWeatherFallback();
  }
}

function initConstellation(){
  const c=document.getElementById("hero-canvas");
  if(!c)return;
  const ctx=c.getContext("2d");
  const rect=c.parentElement.getBoundingClientRect();
  c.width=rect.width||window.innerWidth;
  c.height=rect.height||580;
  const W=c.width,H=c.height;
  // Generate stars
  const stars=[];
  for(let i=0;i<55;i++){
    stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.8+0.4,
      vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.1,
      a:Math.random(),da:Math.random()*.02+.005,
      col:["rgba(255,255,255","rgba(148,210,189","rgba(94,230,240","rgba(232,105,26"][Math.floor(Math.random()*4)]
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Draw connecting lines between nearby stars
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<130){
          const alpha=(1-dist/130)*.12;
          ctx.beginPath();
          ctx.moveTo(stars[i].x,stars[i].y);
          ctx.lineTo(stars[j].x,stars[j].y);
          ctx.strokeStyle=`rgba(148,210,189,${alpha})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }
    // Draw stars
    stars.forEach(s=>{
      s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      const col=s.col+`,${s.a*.9})`;
      ctx.fillStyle=col;
      ctx.shadowBlur=s.r*4;
      ctx.shadowColor=col;
      ctx.fill();
      ctx.shadowBlur=0;
      // Move
      s.x+=s.vx;s.y+=s.vy;
      if(s.x<0)s.x=W;if(s.x>W)s.x=0;
      if(s.y<0)s.y=H;if(s.y>H)s.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
function initAnimations(){
  if(!window.IntersectionObserver)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('fade-up');obs.unobserve(e.target);}});
  },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.card,.kc,.cc,.ic,.aw-c,.jc,.hl').forEach(el=>{
    el.style.opacity='0';el.style.transform='translateY(20px)';
    obs.observe(el);
  });
}

function setMapLayer(type){
  if(!gatiMap){initGatiMap();return;}
  if(currentTileLayer)gatiMap.removeLayer(currentTileLayer);
  var urls={
    street:"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    satellite:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    terrain:"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png"
  };
  var attrs={street:"&copy; OpenStreetMap",satellite:"&copy; Esri",terrain:"&copy; OpenTopoMap"};
  currentTileLayer=L.tileLayer(urls[type],{attribution:attrs[type],maxZoom:19}).addTo(gatiMap);
  ["street","sat","terrain"].forEach(function(t){
    var btn=document.getElementById("btn-"+t);
    if(btn){
      var active=(t===type)||(type==="street"&&t==="street");
      btn.style.background=active?"var(--t)":"transparent";
      btn.style.color=active?"#fff":"var(--tx2)";
    }
  });
}

// 1. PWA — Install Prompt
// ══════════════════════════════════════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 3 seconds
  setTimeout(() => {
    if (deferredPrompt) {
      const banner = document.createElement('div');
      banner.id = 'pwa-banner';
      banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1b4332,#0a9396);color:#fff;border-radius:14px;padding:12px 18px;z-index:9999;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);font-family:sans-serif;max-width:340px;width:calc(100% - 40px)';
      banner.innerHTML = '<span style="font-size:24px">📱</span><div style="flex:1"><div style="font-weight:800;font-size:13px">Install Narnoor ABP App</div><div style="font-size:11px;opacity:.8">Add to home screen — works offline!</div></div><button onclick="installPWA()" style="background:#fff;color:#1b4332;border:none;padding:7px 14px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap">Install</button><button onclick="this.parentElement.remove()" style="background:transparent;color:#fff;border:none;font-size:18px;cursor:pointer;padding:0 4px">×</button>';
      document.body.appendChild(banner);
    }
  }, 3000);
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') toast('✓ App installed successfully!');
      deferredPrompt = null;
      const b = document.getElementById('pwa-banner');
      if (b) b.remove();
    });
  }
}

// ══════════════════════════════════════════════════════════════
// 2. Voice Input for AI Chat
// ══════════════════════════════════════════════════════════════
let recognition = null;
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { toast('❌ Voice not supported in this browser'); return; }
  if (!recognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'te-IN'; // Telugu first, fallback to English
    recognition.onresult = e => {
      const transcript = e.results[0][0].transcript;
      const inp = document.getElementById('chat-in');
      if (inp) { inp.value = transcript; sendChat(); }
    };
    recognition.onerror = () => {
      // Try English if Telugu fails
      recognition.lang = 'en-IN';
      recognition.start();
    };
  }
  const btn = document.getElementById('voice-btn');
  if (btn) btn.style.background = '#fee2e2';
  recognition.start();
  toast('🎤 Listening... Speak now!');
  setTimeout(() => { if (btn) btn.style.background = 'var(--tp)'; }, 3000);
}

const surveyRatings = {};

  surveyRatings[id] = val;

  el.closest('.survey-q-btns')
    ? el.closest('.survey-q-btns').querySelectorAll('button').forEach(b => b.style.background = 'rgba(255,255,255,.1)')
    : el.parentElement.querySelectorAll('button').forEach(b => { b.style.background='rgba(255,255,255,.1)'; b.style.borderColor='rgba(255,255,255,.2)'; });

function submitSurvey() {
  const labels = {sq1:'Overall Development',sq2:'Scheme Benefits',sq3:'Healthcare',sq4:'Infrastructure'};
  const ratings = ['','😞 Poor','😐 OK','😊 Good','🌟 Excellent'];
  let msg = 'Citizen Survey — Narnoor Block\n\n';
  msg += 'Date: ' + new Date().toLocaleDateString('en-IN') + '\n';
  msg += '━━━━━━━━━━━━━━━━━━\n';
  for (const [id, val] of Object.entries(surveyRatings)) {
    msg += labels[id] + ': ' + ratings[val] + '\n';
  }
  const comment = document.getElementById('survey-comment')?.value;
  if (comment) msg += '\nComments: ' + comment;
  msg += '\n\nThank you for your feedback!';
  WS(msg, 'survey');
}

// ══════════════════════════════════════════════════════════════
// 4. Real-time KPI auto-refresh (every 5 mins)
// ══════════════════════════════════════════════════════════════
let kpiRefreshInterval = null;
function startKPIAutoRefresh() {
  if (kpiRefreshInterval) return;
  kpiRefreshInterval = setInterval(async () => {
    if (pg !== 'dashboard') return;
    try {
      const fresh = await sG('kpis', 'sort_order');
      if (fresh && fresh.length > 0) {
        const changed = fresh.some((k,i) => D.kpis[i] && k.progress !== D.kpis[i].progress);
        if (changed) { D.kpis = fresh; R(); toast('📊 KPIs updated!'); }
      }
    } catch(e) {}
  }, 5 * 60 * 1000); // every 5 minutes
}
// Start auto-refresh
setTimeout(startKPIAutoRefresh, 10000);

// ══════════════════════════════════════════════════════════════
// 5. Offline mode detection + banner
// ══════════════════════════════════════════════════════════════
function checkOnline() {
  const banner = document.getElementById('offline-banner');
  if (!navigator.onLine) {
    if (!banner) {
      const b = document.createElement('div');
      b.id = 'offline-banner';
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:700;z-index:10000';
      b.innerHTML = '⚠️ You are offline — showing cached data. Some features may not work.';
      document.body.prepend(b);
    }
  } else {
    if (banner) banner.remove();
  }
}
window.addEventListener('online', checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

// ══════════════════════════════════════════════════════════════
// 6. Comparison Dashboard - show after KPI section
// ══════════════════════════════════════════════════════════════
function getComparisonHTML() {
  const blockStats = {
    sat: (D.kpis.filter(k => k.progress >= 100 || k.status === 'sat').length),
    total: D.kpis.filter(k => !k.block_kpi).length,
    rank: g('predLastRank') || '1st Rank South Zone 2025',
  };
  const pct = blockStats.total ? Math.round(blockStats.sat / blockStats.total * 100) : 0;
  const compBlocks = [
    {name:'Narnoor ★', pct: pct, rank:'1st South Zone', color:'#1b4332', highlight:true},
    {name:'National Avg', pct: 68, rank:'ABP Average', color:'#0a9396', highlight:false},
    {name:'Telangana Avg', pct: 72, rank:'State Average', color:'#0369a1', highlight:false},
    {name:'South Zone Top', pct: pct, rank:'(Narnoor)', color:'#E8691A', highlight:false},
  ];
  return `<div style="margin-top:28px;background:linear-gradient(135deg,#0d1b2a,#1b4332);border-radius:var(--r2);padding:22px">
    <div style="font-size:10px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">📊 Comparison Dashboard</div>
    <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:18px">Narnoor vs National ABP Average</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      ${compBlocks.map(b=>`
      <div style="background:${b.highlight?'rgba(232,105,26,.15)':'rgba(255,255,255,.06)'};border:1.5px solid ${b.highlight?b.color+'66':'rgba(255,255,255,.1)'};border-radius:12px;padding:14px;${b.highlight?'border-top:3px solid #E8691A':''}">
        <div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:6px">${b.name}</div>
        <div style="font-family:'Poppins',sans-serif;font-size:28px;font-weight:900;color:${b.color}">${b.pct}%</div>
        <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:8px">${b.rank}</div>
        <div style="height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${b.pct}%;background:${b.color};border-radius:4px;transition:width 1s ease"></div>
        </div>
      </div>`).join('')}
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:12px">* National & State averages are indicative based on ABP reports. Narnoor data is live.</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// 7. Live KPI Progress animation
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Animate progress bars when they come into view
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const bars = entry.target.querySelectorAll('.kpi-bar');
        bars.forEach(bar => { bar.style.width = bar.style.width; }); // trigger reflow
      }
    });
  }, {threshold: 0.1});
  
  const app = document.getElementById('app');
  if (app) observer.observe(app);
});

// ══════════════════════════════════════════════════════════════
// 8. Service Worker Registration (Offline Support)
// ══════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(e => console.log('SW registration failed:', e));
  });
}
